apiVersion: v1
kind: Secret
metadata:
  name: lionsforge-backend-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://user:password@postgres:5432/lionsforge"
  JWT_SECRET_KEY: "replace-with-secret-manager-value"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  MARKET_DATA_API_KEY: ""
  NEWS_API_KEY: ""
