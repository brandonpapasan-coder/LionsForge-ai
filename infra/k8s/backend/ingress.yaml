apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lionsforge-backend
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.staging.lionsforge.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lionsforge-backend
                port:
                  number: 80
