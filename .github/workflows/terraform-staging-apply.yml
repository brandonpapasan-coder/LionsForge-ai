name: Terraform Staging Apply

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type APPLY-STAGING to confirm a billable staging change
        required: true
      plan_run_id:
        description: GitHub Actions run ID containing the reviewed staging-terraform-plan artifact
        required: true

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: terraform-staging-apply
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ inputs.confirmation == 'APPLY-STAGING' }}
    runs-on: ubuntu-latest
    environment:
      name: staging-apply
    defaults:
      run:
        working-directory: infra/terraform/aws/staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Initialize remote backend
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=aws/staging/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Download reviewed plan artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-terraform-plan
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}
          path: infra/terraform/aws/staging/reviewed-plan

      - name: Verify plan artifact
        run: |
          test -f reviewed-plan/staging.tfplan
          test -f reviewed-plan/staging-plan.txt
          terraform show -no-color reviewed-plan/staging.tfplan > applied-plan.txt
          diff -u reviewed-plan/staging-plan.txt applied-plan.txt

      - name: Apply reviewed plan
        run: terraform apply -input=false -lock-timeout=5m reviewed-plan/staging.tfplan

      - name: Export non-sensitive outputs
        run: terraform output -json > staging-outputs.json

      - name: Upload apply record
        uses: actions/upload-artifact@v4
        with:
          name: staging-terraform-apply-record
          path: |
            infra/terraform/aws/staging/reviewed-plan/staging-plan.txt
            infra/terraform/aws/staging/staging-outputs.json
          retention-days: 30
