name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable backend image tag (40-character commit SHA)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          test -n "${IMAGE_TAG}"
          if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "image_tag must be an immutable 40-character lowercase commit SHA" >&2
            exit 1
          fi
          case "${STAGING_API_URL}" in
            https://*) ;;
            *) echo "STAGING_API_URL must be a non-empty HTTPS URL" >&2; exit 1 ;;
          esac

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/backend:${IMAGE_TAG}"
          docker build -t "${IMAGE}" backend
          docker push "${IMAGE}"
          docker pull "${IMAGE}"
          IMAGE_REF="$(docker image inspect "${IMAGE}" --format '{{index .RepoDigests 0}}')"
          IMAGE_DIGEST="${IMAGE_REF##*@}"
          if ! printf '%s' "${IMAGE_DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Could not resolve an immutable sha256 image digest" >&2
            exit 1
          fi
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

      - name: Configure kubectl
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          test -n "${KUBE_CONFIG_STAGING}"
          mkdir -p "$HOME/.kube"
          printf '%s' "${KUBE_CONFIG_STAGING}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Apply staging configuration
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_JWT_SECRET_KEY: ${{ secrets.STAGING_JWT_SECRET_KEY }}
          STAGING_OPENAI_API_KEY: ${{ secrets.STAGING_OPENAI_API_KEY }}
        run: |
          test -n "${STAGING_DATABASE_URL}"
          test -n "${STAGING_JWT_SECRET_KEY}"
          test -n "${STAGING_OPENAI_API_KEY}"
          kubectl create namespace lionsforge-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n lionsforge-staging create secret generic lionsforge-backend-secrets \
            --from-literal=DATABASE_URL="${STAGING_DATABASE_URL}" \
            --from-literal=JWT_SECRET_KEY="${STAGING_JWT_SECRET_KEY}" \
            --from-literal=OPENAI_API_KEY="${STAGING_OPENAI_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k infra/k8s/overlays/staging
          kubectl -n lionsforge-staging set image deployment/lionsforge-backend backend="${IMAGE_REF}"
          kubectl -n lionsforge-staging rollout status deployment/lionsforge-backend --timeout=300s

      - name: Verify deployed image provenance
        run: |
          set -euo pipefail
          mapfile -t IMAGE_IDS < <(
            kubectl -n lionsforge-staging get pods \
              -l app=lionsforge-backend \
              -o jsonpath='{range .items[*].status.containerStatuses[?(@.name=="backend")]}{.imageID}{"\n"}{end}'
          )
          test "${#IMAGE_IDS[@]}" -gt 0
          for image_id in "${IMAGE_IDS[@]}"; do
            normalized="${image_id#docker-pullable://}"
            if [[ "${normalized}" != *@"${IMAGE_DIGEST}" ]]; then
              echo "Running pod image ID does not match pushed digest" >&2
              exit 1
            fi
          done
          echo "DEPLOYED_IMAGE_IDS=${#IMAGE_IDS[@]}" >> "$GITHUB_ENV"

      - name: Run staging smoke test
        env:
          STAGING_TEST_EMAIL: ${{ secrets.STAGING_TEST_EMAIL }}
          STAGING_TEST_SECRET: ${{ secrets.STAGING_TEST_SECRET }}
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          test -n "${STAGING_API_URL}"
          test -n "${STAGING_TEST_EMAIL}"
          test -n "${STAGING_TEST_SECRET}"
          python scripts/staging_smoke.py --base-url "${STAGING_API_URL}"

      - name: Publish image provenance summary
        if: always()
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "## Staging image provenance"
            echo
            echo "- Release SHA tag: \`${IMAGE_TAG}\`"
            echo "- Registry digest: \`${IMAGE_DIGEST:-unavailable}\`"
            echo "- Running backend containers verified: \`${DEPLOYED_IMAGE_IDS:-0}\`"
            echo
            echo "Record the digest in the staging acceptance record. No credentials or registry tokens are included."
          } >> "${GITHUB_STEP_SUMMARY}"
