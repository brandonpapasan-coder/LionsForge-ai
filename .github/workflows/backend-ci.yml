name: Backend CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lionsforge_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d lionsforge_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg://postgres@localhost:5432/lionsforge_ci
      JWT_SECRET_KEY: ci-test-secret
      ENVIRONMENT: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Dependency security audit
        run: pip-audit -r requirements.txt

      - name: Static security scan
        run: bandit -q -r app

      - name: Ruff lint
        run: >-
          ruff check
          --select E9,F63,F7,F82
          app/main.py
          app/api/routes/system.py
          app/core/dependency_health.py
          app/core/metrics.py
          app/core/observability.py
          app/core/rate_limit.py
          app/schemas/system_readiness.py
          scripts/export_openapi.py
          scripts/validate_openapi.py
          tests/test_health.py
          tests/test_system_readiness.py
          tests/test_rate_limit.py
          tests/test_error_observability.py
          tests/test_autonomous_portfolio_intelligence.py

      - name: Ruff format app main
        run: ruff format --check app/main.py

      - name: Ruff format dependency health
        run: ruff format --check app/core/dependency_health.py

      - name: Ruff format metrics
        run: ruff format --check app/core/metrics.py

      - name: Ruff format observability
        run: ruff format --check app/core/observability.py

      - name: Ruff format rate limit
        run: ruff format --check app/core/rate_limit.py

      - name: Ruff format system readiness schema
        run: ruff format --check app/schemas/system_readiness.py

      - name: Ruff format OpenAPI exporter
        run: ruff format --check scripts/export_openapi.py

      - name: Ruff format OpenAPI validator
        run: ruff format --check scripts/validate_openapi.py

      - name: Type check
        run: >-
          mypy
          --follow-imports=skip
          app/main.py
          app/api/routes/system.py
          app/core/dependency_health.py
          app/core/metrics.py
          app/core/observability.py
          app/core/rate_limit.py
          app/schemas/system_readiness.py
          scripts/export_openapi.py
          scripts/validate_openapi.py

      - name: Validate Alembic migrations on PostgreSQL
        run: |
          alembic upgrade head
          alembic current

      - name: Run backend smoke check
        run: python scripts/smoke_backend.py

      - name: Run full test suite with enforced coverage
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=75 2>&1 | tee pytest.log

      - name: Export OpenAPI schema
        run: PYTHONPATH=. python scripts/export_openapi.py

      - name: Validate OpenAPI contract
        run: python scripts/validate_openapi.py

      - name: Upload backend quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-artifacts
          path: |
            backend/coverage.xml
            backend/openapi.json
            backend/pytest.log
          if-no-files-found: warn

      - name: Build Docker image
        run: docker build -t lionsforge-backend:ci .

      - name: Smoke Docker container
        run: |
          docker run -d --name lionsforge-backend-ci -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./docker_lionsforge.db \
            -e JWT_SECRET_KEY=ci-test-secret \
            -e ENVIRONMENT=test \
            lionsforge-backend:ci
          trap 'docker logs lionsforge-backend-ci; docker rm -f lionsforge-backend-ci' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Performance smoke
        run: python scripts/performance_smoke.py
