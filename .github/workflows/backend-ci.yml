name: Backend CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lionsforge_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d lionsforge_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg://postgres@localhost:5432/lionsforge_ci
      JWT_SECRET_KEY: ci-test-secret
      ENVIRONMENT: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Dependency security audit
        run: pip-audit -r requirements.txt

      - name: Static security scan
        run: bandit -q -r app

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: Ruff format check
        run: ruff format --check app tests scripts

      - name: Type check
        run: mypy app

      - name: Validate Alembic migrations on PostgreSQL
        run: |
          alembic upgrade head
          alembic current

      - name: Run backend smoke check
        run: python scripts/smoke_backend.py

      - name: Run full test suite with enforced coverage
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py

      - name: Validate OpenAPI contract
        run: python scripts/validate_openapi.py

      - name: Upload coverage and OpenAPI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-artifacts
          path: |
            backend/coverage.xml
            backend/openapi.json
          if-no-files-found: warn

      - name: Build Docker image
        run: docker build -t lionsforge-backend:ci .

      - name: Smoke Docker container
        run: |
          docker run -d --name lionsforge-backend-ci -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./docker_lionsforge.db \
            -e JWT_SECRET_KEY=ci-test-secret \
            -e ENVIRONMENT=test \
            lionsforge-backend:ci
          trap 'docker logs lionsforge-backend-ci; docker rm -f lionsforge-backend-ci' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Performance smoke
        run: python scripts/performance_smoke.py
