name: Backend CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lionsforge_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d lionsforge_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg://postgres@localhost:5432/lionsforge_ci
      JWT_SECRET_KEY: ci-test-secret
      ENVIRONMENT: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Dependency security audit
        run: pip-audit -r requirements.txt > dependency-audit.log 2>&1

      - name: Upload dependency audit failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-log
          path: backend/dependency-audit.log

      - name: Static security scan
        run: bandit -q -r app

      - name: Run smoke check
        run: python scripts/smoke_backend.py

      - name: Test health
        run: pytest -q tests/test_health.py --tb=short -s > health-test.log 2>&1

      - name: Upload health failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: health-test-log
          path: backend/health-test.log

      - name: Test auth
        run: pytest -q tests/test_auth.py --tb=short -s > auth-test.log 2>&1

      - name: Upload auth failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-test-log
          path: backend/auth-test.log

      - name: Test market
        run: pytest -q tests/test_market.py tests/test_market_provider_selector.py tests/test_quote_cache.py

      - name: Test product APIs
        run: pytest -q tests/test_watchlists.py tests/test_portfolios.py tests/test_alerts.py --tb=short -s > product-api-test.log 2>&1

      - name: Upload product API failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-api-test-log
          path: backend/product-api-test.log

      - name: Test research APIs
        run: pytest -q tests/test_company_news.py tests/test_research_context.py tests/test_research_evidence.py tests/test_research_confidence.py tests/test_investment_thesis.py

      - name: Coverage threshold
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=60

      - name: Build Docker image
        run: docker build -t lionsforge-backend:ci .

      - name: Smoke Docker container
        run: |
          docker run -d --name lionsforge-backend-ci -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./docker_lionsforge.db \
            -e JWT_SECRET_KEY=ci-test-secret \
            -e ENVIRONMENT=test \
            lionsforge-backend:ci
          sleep 8
          curl --fail http://127.0.0.1:8000/health
          docker logs lionsforge-backend-ci
          docker stop lionsforge-backend-ci

      - name: Performance smoke
        run: python scripts/performance_smoke.py
