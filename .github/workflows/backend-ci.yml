name: Backend CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run smoke check
        env:
          DATABASE_URL: sqlite:///./ci_lionsforge.db
          JWT_SECRET_KEY: ci-test-secret
          ENVIRONMENT: test
        run: python scripts/smoke_backend.py

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./ci_lionsforge.db
          JWT_SECRET_KEY: ci-test-secret
          ENVIRONMENT: test
        run: pytest -q -x
