name: Terraform Staging Plan

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    environment:
      name: staging
    defaults:
      run:
        working-directory: infra/terraform/aws/staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Initialize remote backend
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=aws/staging/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Validate configuration
        run: terraform validate

      - name: Create reviewed plan
        run: terraform plan -input=false -lock-timeout=5m -out=staging.tfplan

      - name: Render plan summary
        run: terraform show -no-color staging.tfplan > staging-plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-terraform-plan
          path: |
            infra/terraform/aws/staging/staging.tfplan
            infra/terraform/aws/staging/staging-plan.txt
          retention-days: 7
