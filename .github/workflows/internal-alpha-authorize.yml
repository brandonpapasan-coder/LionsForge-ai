name: Internal Alpha Authorize

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact 40-character lowercase protected-main candidate SHA
        required: true
        type: string
      backend_digest:
        description: Immutable backend image digest (sha256:...)
        required: true
        type: string
      frontend_digest:
        description: Immutable frontend image digest (sha256:...)
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Require protected-main dispatch
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          [[ "${DISPATCH_REF}" == "refs/heads/main" ]] || {
            echo "Internal Alpha authorization must be dispatched from protected main" >&2
            exit 1
          }

      - name: Checkout protected main history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Verify protected-main checkout and workflow provenance
        env:
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          checked_out_sha="$(git rev-parse HEAD)"
          protected_main_sha="$(git rev-parse origin/main)"
          [[ "${checked_out_sha}" == "${protected_main_sha}" ]] || {
            echo "Checked-out HEAD does not equal origin/main" >&2
            exit 1
          }
          [[ "${WORKFLOW_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Workflow SHA must be an exact 40-character lowercase commit SHA" >&2
            exit 1
          }
          [[ "${WORKFLOW_SHA}" == "${protected_main_sha}" ]] || {
            echo "Workflow definition SHA does not equal protected main" >&2
            exit 1
          }

      - name: Validate authorization inputs and record provenance
        env:
          RECORD_PATH: docs/operations/internal-alpha-readiness-gate.md
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BACKEND_DIGEST: ${{ inputs.backend_digest }}
          FRONTEND_DIGEST: ${{ inputs.frontend_digest }}
        run: |
          set -euo pipefail

          if [[ ! "${CANDIDATE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "candidate_sha must be an exact 40-character lowercase commit SHA" >&2
            exit 1
          fi
          for digest_name in BACKEND_DIGEST FRONTEND_DIGEST; do
            digest="${!digest_name}"
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "${digest_name} must be an immutable lowercase sha256 digest" >&2
              exit 1
            fi
          done

          git cat-file -e "${CANDIDATE_SHA}^{commit}"
          git merge-base --is-ancestor "${CANDIDATE_SHA}" origin/main
          test -f "${RECORD_PATH}"

          decision="$(sed -n 's/^- Decision:[[:space:]]*\*\*\([^*]*\)\*\*.*/\1/p' "${RECORD_PATH}" | head -n 1)"
          recorded_sha="$(sed -n 's/^- Protected-main implementation merge:[[:space:]]*`\([^`]*\)`.*/\1/p' "${RECORD_PATH}" | head -n 1)"
          recorded_backend="$(sed -n 's/^- Backend image digest:[[:space:]]*`\([^`]*\)`.*/\1/p' "${RECORD_PATH}" | head -n 1)"
          recorded_frontend="$(sed -n 's/^- Frontend image digest:[[:space:]]*`\([^`]*\)`.*/\1/p' "${RECORD_PATH}" | head -n 1)"

          [[ "${decision}" == "GO" ]] || { echo "Internal Alpha record decision must be GO" >&2; exit 1; }
          [[ "${recorded_sha}" == "${CANDIDATE_SHA}" ]] || { echo "candidate_sha does not match the readiness record" >&2; exit 1; }
          [[ "${recorded_backend}" == "${BACKEND_DIGEST}" ]] || { echo "backend_digest does not match the readiness record" >&2; exit 1; }
          [[ "${recorded_frontend}" == "${FRONTEND_DIGEST}" ]] || { echo "frontend_digest does not match the readiness record" >&2; exit 1; }

      - name: Verify required release gates
        id: release-gates
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -o pipefail
          python scripts/verify_release_gates.py \
            --repository "${GITHUB_REPOSITORY}" \
            --sha "${RELEASE_SHA}" \
            --output internal-alpha-release-gate-evidence.json \
            | tee internal-alpha-release-gate-evidence.txt

      - name: Generate authorization manifest
        id: manifest
        env:
          DISPATCH_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          PROTECTED_MAIN_SHA: ${{ github.sha }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BACKEND_DIGEST: ${{ inputs.backend_digest }}
          FRONTEND_DIGEST: ${{ inputs.frontend_digest }}
        run: |
          set -o pipefail
          python scripts/write_internal_alpha_authorization_manifest.py \
            --repository "${GITHUB_REPOSITORY}" \
            --dispatch-ref "${DISPATCH_REF}" \
            --workflow-sha "${WORKFLOW_SHA}" \
            --protected-main-sha "${PROTECTED_MAIN_SHA}" \
            --candidate-sha "${CANDIDATE_SHA}" \
            --backend-digest "${BACKEND_DIGEST}" \
            --frontend-digest "${FRONTEND_DIGEST}" \
            --gate-evidence internal-alpha-release-gate-evidence.json \
            --output internal-alpha-authorization-manifest.json \
            | tee internal-alpha-authorization-manifest.txt

      - name: Validate authorization manifest
        id: manifest-validation
        run: |
          set -o pipefail
          python scripts/validate_internal_alpha_authorization_manifest.py \
            internal-alpha-authorization-manifest.json \
            | tee internal-alpha-authorization-manifest-validation.txt

      - name: Validate Internal Alpha readiness record
        id: validate
        run: |
          set -o pipefail
          python scripts/validate_internal_alpha_readiness.py \
            docs/operations/internal-alpha-readiness-gate.md \
            | tee internal-alpha-readiness-validation.txt

      - name: Validate Internal Alpha evidence references
        id: evidence
        run: |
          set -o pipefail
          python scripts/validate_internal_alpha_evidence.py \
            docs/operations/internal-alpha-readiness-gate.md \
            | tee internal-alpha-evidence-validation.txt

      - name: Generate authorization evidence checksum inventory
        id: checksum-inventory
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_evidence_checksums.py write \
            --inventory internal-alpha-authorization-evidence-checksums.json \
            internal-alpha-release-gate-evidence.json \
            internal-alpha-release-gate-evidence.txt \
            internal-alpha-authorization-manifest.json \
            internal-alpha-authorization-manifest.txt \
            internal-alpha-authorization-manifest-validation.txt \
            internal-alpha-readiness-validation.txt \
            internal-alpha-evidence-validation.txt \
            | tee internal-alpha-authorization-evidence-checksum-generation.txt

      - name: Verify authorization evidence checksum inventory
        id: checksum-verification
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_evidence_checksums.py verify \
            --inventory internal-alpha-authorization-evidence-checksums.json \
            internal-alpha-release-gate-evidence.json \
            internal-alpha-release-gate-evidence.txt \
            internal-alpha-authorization-manifest.json \
            internal-alpha-authorization-manifest.txt \
            internal-alpha-authorization-manifest-validation.txt \
            internal-alpha-readiness-validation.txt \
            internal-alpha-evidence-validation.txt \
            | tee internal-alpha-authorization-evidence-checksum-verification.txt

      - name: Generate final authorization receipt
        id: receipt
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_authorization_receipt.py write \
            --manifest internal-alpha-authorization-manifest.json \
            --inventory internal-alpha-authorization-evidence-checksums.json \
            --receipt internal-alpha-authorization-receipt.json \
            | tee internal-alpha-authorization-receipt-generation.txt

      - name: Verify final authorization receipt
        id: receipt-verification
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_authorization_receipt.py verify \
            --manifest internal-alpha-authorization-manifest.json \
            --inventory internal-alpha-authorization-evidence-checksums.json \
            --receipt internal-alpha-authorization-receipt.json \
            | tee internal-alpha-authorization-receipt-verification.txt

      - name: Generate fail-closed authorization decision
        id: decision
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BACKEND_DIGEST: ${{ inputs.backend_digest }}
          FRONTEND_DIGEST: ${{ inputs.frontend_digest }}
          RELEASE_GATES_OUTCOME: ${{ steps.release-gates.outcome }}
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          MANIFEST_VALIDATION_OUTCOME: ${{ steps.manifest-validation.outcome }}
          READINESS_OUTCOME: ${{ steps.validate.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          CHECKSUM_INVENTORY_OUTCOME: ${{ steps.checksum-inventory.outcome }}
          CHECKSUM_VERIFICATION_OUTCOME: ${{ steps.checksum-verification.outcome }}
          RECEIPT_OUTCOME: ${{ steps.receipt.outcome }}
          RECEIPT_VERIFICATION_OUTCOME: ${{ steps.receipt-verification.outcome }}
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_authorization_decision.py write \
            --output internal-alpha-authorization-decision.json \
            --repository "${GITHUB_REPOSITORY}" \
            --run-id "${RUN_ID}" \
            --run-attempt "${RUN_ATTEMPT}" \
            --workflow-sha "${WORKFLOW_SHA}" \
            --candidate-sha "${CANDIDATE_SHA}" \
            --backend-digest "${BACKEND_DIGEST}" \
            --frontend-digest "${FRONTEND_DIGEST}" \
            --step "release-gates=${RELEASE_GATES_OUTCOME:-not-run}" \
            --step "manifest=${MANIFEST_OUTCOME:-not-run}" \
            --step "manifest-validation=${MANIFEST_VALIDATION_OUTCOME:-not-run}" \
            --step "validate=${READINESS_OUTCOME:-not-run}" \
            --step "evidence=${EVIDENCE_OUTCOME:-not-run}" \
            --step "checksum-inventory=${CHECKSUM_INVENTORY_OUTCOME:-not-run}" \
            --step "checksum-verification=${CHECKSUM_VERIFICATION_OUTCOME:-not-run}" \
            --step "receipt=${RECEIPT_OUTCOME:-not-run}" \
            --step "receipt-verification=${RECEIPT_VERIFICATION_OUTCOME:-not-run}" \
            | tee internal-alpha-authorization-decision-generation.txt

      - name: Verify fail-closed authorization decision
        id: decision-verification
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BACKEND_DIGEST: ${{ inputs.backend_digest }}
          FRONTEND_DIGEST: ${{ inputs.frontend_digest }}
          RELEASE_GATES_OUTCOME: ${{ steps.release-gates.outcome }}
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          MANIFEST_VALIDATION_OUTCOME: ${{ steps.manifest-validation.outcome }}
          READINESS_OUTCOME: ${{ steps.validate.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          CHECKSUM_INVENTORY_OUTCOME: ${{ steps.checksum-inventory.outcome }}
          CHECKSUM_VERIFICATION_OUTCOME: ${{ steps.checksum-verification.outcome }}
          RECEIPT_OUTCOME: ${{ steps.receipt.outcome }}
          RECEIPT_VERIFICATION_OUTCOME: ${{ steps.receipt-verification.outcome }}
        run: |
          set -o pipefail
          python scripts/manage_internal_alpha_authorization_decision.py verify \
            --output internal-alpha-authorization-decision.json \
            --repository "${GITHUB_REPOSITORY}" \
            --run-id "${RUN_ID}" \
            --run-attempt "${RUN_ATTEMPT}" \
            --workflow-sha "${WORKFLOW_SHA}" \
            --candidate-sha "${CANDIDATE_SHA}" \
            --backend-digest "${BACKEND_DIGEST}" \
            --frontend-digest "${FRONTEND_DIGEST}" \
            --step "release-gates=${RELEASE_GATES_OUTCOME:-not-run}" \
            --step "manifest=${MANIFEST_OUTCOME:-not-run}" \
            --step "manifest-validation=${MANIFEST_VALIDATION_OUTCOME:-not-run}" \
            --step "validate=${READINESS_OUTCOME:-not-run}" \
            --step "evidence=${EVIDENCE_OUTCOME:-not-run}" \
            --step "checksum-inventory=${CHECKSUM_INVENTORY_OUTCOME:-not-run}" \
            --step "checksum-verification=${CHECKSUM_VERIFICATION_OUTCOME:-not-run}" \
            --step "receipt=${RECEIPT_OUTCOME:-not-run}" \
            --step "receipt-verification=${RECEIPT_VERIFICATION_OUTCOME:-not-run}" \
            | tee internal-alpha-authorization-decision-verification.txt

      - name: Publish authorization summary
        if: always()
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BACKEND_DIGEST: ${{ inputs.backend_digest }}
          FRONTEND_DIGEST: ${{ inputs.frontend_digest }}
          DISPATCH_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          GATE_OUTCOME: ${{ steps.release-gates.outcome }}
          MANIFEST_OUTCOME: ${{ steps.manifest.outcome }}
          MANIFEST_VALIDATION_OUTCOME: ${{ steps.manifest-validation.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          CHECKSUM_INVENTORY_OUTCOME: ${{ steps.checksum-inventory.outcome }}
          CHECKSUM_VERIFICATION_OUTCOME: ${{ steps.checksum-verification.outcome }}
          RECEIPT_OUTCOME: ${{ steps.receipt.outcome }}
          RECEIPT_VERIFICATION_OUTCOME: ${{ steps.receipt-verification.outcome }}
          DECISION_OUTCOME: ${{ steps.decision.outcome }}
          DECISION_VERIFICATION_OUTCOME: ${{ steps.decision-verification.outcome }}
        run: |
          authorization="not-authorized"
          if [[ "${DECISION_OUTCOME}" == "success" && "${DECISION_VERIFICATION_OUTCOME}" == "success" ]] \
            && grep -q '"authorized": true' internal-alpha-authorization-decision.json; then
            authorization="authorized"
          fi
          {
            echo "## Internal Alpha authorization"
            echo
            echo "- Dispatch ref: \`${DISPATCH_REF}\`"
            echo "- Workflow SHA: \`${WORKFLOW_SHA}\`"
            echo "- Candidate SHA: \`${CANDIDATE_SHA}\`"
            echo "- Backend digest: \`${BACKEND_DIGEST}\`"
            echo "- Frontend digest: \`${FRONTEND_DIGEST}\`"
            echo "- Release gate outcome: \`${GATE_OUTCOME:-not-run}\`"
            echo "- Authorization manifest outcome: \`${MANIFEST_OUTCOME:-not-run}\`"
            echo "- Authorization manifest validator outcome: \`${MANIFEST_VALIDATION_OUTCOME:-not-run}\`"
            echo "- Readiness validator outcome: \`${VALIDATION_OUTCOME:-not-run}\`"
            echo "- Evidence validator outcome: \`${EVIDENCE_OUTCOME:-not-run}\`"
            echo "- Evidence checksum inventory outcome: \`${CHECKSUM_INVENTORY_OUTCOME:-not-run}\`"
            echo "- Evidence checksum verification outcome: \`${CHECKSUM_VERIFICATION_OUTCOME:-not-run}\`"
            echo "- Final authorization receipt outcome: \`${RECEIPT_OUTCOME:-not-run}\`"
            echo "- Final authorization receipt verification outcome: \`${RECEIPT_VERIFICATION_OUTCOME:-not-run}\`"
            echo "- Authorization decision generation outcome: \`${DECISION_OUTCOME:-not-run}\`"
            echo "- Authorization decision verification outcome: \`${DECISION_VERIFICATION_OUTCOME:-not-run}\`"
            echo "- Final authorization decision: \`${authorization}\`"
            echo
            echo "This workflow validates repository provenance only. It does not independently prove external staging behavior or authorize public access."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload non-sensitive authorization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internal-alpha-authorization-evidence
          path: |
            internal-alpha-release-gate-evidence.json
            internal-alpha-release-gate-evidence.txt
            internal-alpha-authorization-manifest.json
            internal-alpha-authorization-manifest.txt
            internal-alpha-authorization-manifest-validation.txt
            internal-alpha-readiness-validation.txt
            internal-alpha-evidence-validation.txt
            internal-alpha-authorization-evidence-checksums.json
            internal-alpha-authorization-evidence-checksum-generation.txt
            internal-alpha-authorization-evidence-checksum-verification.txt
            internal-alpha-authorization-receipt.json
            internal-alpha-authorization-receipt-generation.txt
            internal-alpha-authorization-receipt-verification.txt
            internal-alpha-authorization-decision.json
            internal-alpha-authorization-decision-generation.txt
            internal-alpha-authorization-decision-verification.txt
          if-no-files-found: warn
          retention-days: 90
