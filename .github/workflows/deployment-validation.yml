name: Deployment Validation

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  validate-kubernetes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Build staging manifests
        run: kubectl kustomize infra/k8s/overlays/staging > staging-rendered.yaml

      - name: Build production manifests
        run: kubectl kustomize infra/k8s/overlays/production > production-rendered.yaml

      - name: Validate rendered manifests
        run: |
          test -s staging-rendered.yaml
          test -s production-rendered.yaml
          grep -q "kind: Deployment" staging-rendered.yaml
          grep -q "kind: Service" staging-rendered.yaml
          grep -q "kind: Deployment" production-rendered.yaml
          grep -q "kind: Service" production-rendered.yaml

      - name: Validate monitoring assets
        run: |
          python -m json.tool infra/monitoring/grafana/lionsforge-backend-dashboard.json > /dev/null
          test -s infra/monitoring/prometheus/lionsforge-alerts.yml
          grep -q "LionsForgeBackendDown" infra/monitoring/prometheus/lionsforge-alerts.yml
          grep -q "LionsForgeHighHttpErrorRate" infra/monitoring/prometheus/lionsforge-alerts.yml
          grep -q "lionsforge_http_requests_total" infra/monitoring/grafana/lionsforge-backend-dashboard.json
          grep -q "lionsforge_market_provider_available" infra/monitoring/grafana/lionsforge-backend-dashboard.json

      - name: Create disposable kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: lionsforge-ci

      - name: Build and load staging backend image
        run: |
          docker build -t lionsforge-backend:staging backend
          kind load docker-image lionsforge-backend:staging --name lionsforge-ci

      - name: Create staging namespace and PostgreSQL
        run: |
          kubectl create namespace lionsforge-staging --dry-run=client -o yaml | kubectl apply -f -
          cat <<'EOF' | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres
            namespace: lionsforge-staging
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                  - name: postgres
                    image: postgres:16
                    env:
                      - name: POSTGRES_DB
                        value: lionsforge_staging
                      - name: POSTGRES_USER
                        value: lionsforge
                      - name: POSTGRES_PASSWORD
                        value: staging-password
                    ports:
                      - containerPort: 5432
                    readinessProbe:
                      exec:
                        command:
                          - pg_isready
                          - -U
                          - lionsforge
                          - -d
                          - lionsforge_staging
                      initialDelaySeconds: 3
                      periodSeconds: 2
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres
            namespace: lionsforge-staging
          spec:
            selector:
              app: postgres
            ports:
              - port: 5432
                targetPort: 5432
          EOF
          kubectl -n lionsforge-staging rollout status deployment/postgres --timeout=180s

      - name: Configure staging secrets
        run: |
          kubectl -n lionsforge-staging create secret generic lionsforge-backend-secrets \
            --from-literal=DATABASE_URL='postgresql+psycopg://lionsforge:staging-password@postgres:5432/lionsforge_staging' \
            --from-literal=JWT_SECRET_KEY='staging-smoke-secret' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run database migrations in cluster
        run: |
          kubectl -n lionsforge-staging delete job lionsforge-migrate --ignore-not-found
          cat <<'EOF' | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: lionsforge-migrate
            namespace: lionsforge-staging
          spec:
            backoffLimit: 1
            template:
              metadata:
                labels:
                  app: lionsforge-migrate
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: lionsforge-backend:staging
                    imagePullPolicy: Never
                    command:
                      - alembic
                      - upgrade
                      - head
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: lionsforge-backend-secrets
                            key: DATABASE_URL
                      - name: JWT_SECRET_KEY
                        valueFrom:
                          secretKeyRef:
                            name: lionsforge-backend-secrets
                            key: JWT_SECRET_KEY
                      - name: ENVIRONMENT
                        value: staging
          EOF
          if ! kubectl -n lionsforge-staging wait \
            --for=condition=complete job/lionsforge-migrate \
            --timeout=180s; then
            kubectl -n lionsforge-staging describe job/lionsforge-migrate
            kubectl -n lionsforge-staging logs job/lionsforge-migrate --all-containers=true || true
            exit 1
          fi

      - name: Deploy staging manifests
        run: |
          kubectl apply -f staging-rendered.yaml
          kubectl -n lionsforge-staging set image deployment/lionsforge-backend backend=lionsforge-backend:staging
          kubectl -n lionsforge-staging set env deployment/lionsforge-backend ENVIRONMENT=staging
          kubectl -n lionsforge-staging scale deployment/lionsforge-backend --replicas=1
          kubectl -n lionsforge-staging rollout status deployment/lionsforge-backend --timeout=180s

      - name: Smoke staging deployment
        run: |
          kubectl -n lionsforge-staging port-forward service/lionsforge-backend 18000:80 > port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!
          trap 'kill ${PORT_FORWARD_PID} 2>/dev/null || true; cat port-forward.log || true; kubectl -n lionsforge-staging get all; kubectl -n lionsforge-staging logs deployment/lionsforge-backend --all-containers=true || true; kubectl -n lionsforge-staging logs job/lionsforge-migrate || true' EXIT

          ready=false
          for attempt in {1..30}; do
            if ! kill -0 "${PORT_FORWARD_PID}" 2>/dev/null; then
              echo "kubectl port-forward exited before the service became reachable"
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:18000/health > /dev/null; then
              ready=true
              break
            fi
            sleep 2
          done

          test "${ready}" = "true"
          curl --fail --silent http://127.0.0.1:18000/ready \
            | python -c 'import json, sys; payload = json.load(sys.stdin); assert payload["status"] == "ready", payload; assert payload["database"] == "available", payload; assert payload["market_data"] == "available", payload; assert payload["primary_provider"], payload'
          curl --fail --silent http://127.0.0.1:18000/api/v1/system/readiness \
            | python -c 'import json, sys; payload = json.load(sys.stdin); assert payload["status"] == "ready", payload'
