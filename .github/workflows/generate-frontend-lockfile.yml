name: Generate Frontend Lockfile

on:
  push:
    branches:
      - agent/deterministic-frontend-install

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: agent/deterministic-frontend-install

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: commit frontend package lockfile"
          git push origin HEAD:agent/deterministic-frontend-install
