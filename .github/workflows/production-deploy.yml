name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable release commit SHA validated by all required gates
        required: true
      rollback_image_tag:
        description: Immutable previously deployed commit SHA for rollback
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: lionsforge-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Validate deployment inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ROLLBACK_IMAGE_TAG: ${{ inputs.rollback_image_tag }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          set -euo pipefail
          for value in "${IMAGE_TAG}" "${ROLLBACK_IMAGE_TAG}"; do
            if ! printf '%s' "${value}" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "release and rollback tags must be immutable 40-character lowercase commit SHAs" >&2
              exit 1
            fi
          done
          if [ "${IMAGE_TAG}" = "${ROLLBACK_IMAGE_TAG}" ]; then
            echo "rollback_image_tag must identify the previously deployed release" >&2
            exit 1
          fi
          case "${PRODUCTION_API_URL}" in
            https://*) ;;
            *) echo "PRODUCTION_API_URL must be a non-empty HTTPS URL" >&2; exit 1 ;;
          esac

      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.image_tag }}
          fetch-depth: 0

      - name: Confirm release and rollback commits are on main
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ROLLBACK_IMAGE_TAG: ${{ inputs.rollback_image_tag }}
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          test "$(git rev-parse HEAD)" = "${IMAGE_TAG}"
          git merge-base --is-ancestor "${IMAGE_TAG}" origin/main
          git cat-file -e "${ROLLBACK_IMAGE_TAG}^{commit}"
          git merge-base --is-ancestor "${ROLLBACK_IMAGE_TAG}" origin/main

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable backend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/backend:${IMAGE_TAG}"
          docker build -t "${IMAGE}" backend
          docker push "${IMAGE}"
          docker pull "${IMAGE}"
          IMAGE_REF="$(docker image inspect "${IMAGE}" --format '{{index .RepoDigests 0}}')"
          IMAGE_DIGEST="${IMAGE_REF##*@}"
          if ! printf '%s' "${IMAGE_DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Could not resolve an immutable sha256 image digest" >&2
            exit 1
          fi
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

      - name: Configure production kubectl
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          set -euo pipefail
          test -n "${KUBE_CONFIG_PRODUCTION}"
          mkdir -p "$HOME/.kube"
          printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Verify production TLS certificate secret
        run: |
          set -euo pipefail
          kubectl get namespace lionsforge-production >/dev/null
          kubectl -n lionsforge-production get secret lionsforge-api-tls >/dev/null
          test "$(kubectl -n lionsforge-production get secret lionsforge-api-tls -o jsonpath='{.type}')" = "kubernetes.io/tls"
          test -n "$(kubectl -n lionsforge-production get secret lionsforge-api-tls -o jsonpath='{.data.tls\.crt}')"
          test -n "$(kubectl -n lionsforge-production get secret lionsforge-api-tls -o jsonpath='{.data.tls\.key}')"

      - name: Apply production configuration by immutable digest
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_JWT_SECRET_KEY: ${{ secrets.PRODUCTION_JWT_SECRET_KEY }}
          PRODUCTION_OPENAI_API_KEY: ${{ secrets.PRODUCTION_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${PRODUCTION_DATABASE_URL}"
          test -n "${PRODUCTION_JWT_SECRET_KEY}"
          test -n "${PRODUCTION_OPENAI_API_KEY}"
          kubectl create namespace lionsforge-production --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n lionsforge-production create secret generic lionsforge-backend-secrets \
            --from-literal=DATABASE_URL="${PRODUCTION_DATABASE_URL}" \
            --from-literal=JWT_SECRET_KEY="${PRODUCTION_JWT_SECRET_KEY}" \
            --from-literal=OPENAI_API_KEY="${PRODUCTION_OPENAI_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k infra/k8s/overlays/production
          kubectl -n lionsforge-production set image deployment/lionsforge-backend backend="${IMAGE_REF}"
          kubectl -n lionsforge-production rollout status deployment/lionsforge-backend --timeout=300s

      - name: Verify deployed image provenance and probes
        run: |
          set -euo pipefail
          kubectl -n lionsforge-production wait --for=condition=available deployment/lionsforge-backend --timeout=300s
          mapfile -t IMAGE_IDS < <(
            kubectl -n lionsforge-production get pods \
              -l app=lionsforge-backend \
              -o jsonpath='{range .items[*].status.containerStatuses[?(@.name=="backend")]}{.imageID}{"\n"}{end}'
          )
          test "${#IMAGE_IDS[@]}" -gt 0
          for image_id in "${IMAGE_IDS[@]}"; do
            normalized="${image_id#docker-pullable://}"
            if [[ "${normalized}" != *@"${IMAGE_DIGEST}" ]]; then
              echo "Running backend pod image ID does not match pushed digest" >&2
              exit 1
            fi
          done
          echo "DEPLOYED_IMAGE_IDS=${#IMAGE_IDS[@]}" >> "$GITHUB_ENV"

      - name: Run authenticated production smoke test
        env:
          PRODUCTION_TEST_EMAIL: ${{ secrets.PRODUCTION_TEST_EMAIL }}
          PRODUCTION_TEST_SECRET: ${{ secrets.PRODUCTION_TEST_SECRET }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          set -euo pipefail
          test -n "${PRODUCTION_API_URL}"
          test -n "${PRODUCTION_TEST_EMAIL}"
          test -n "${PRODUCTION_TEST_SECRET}"
          STAGING_TEST_EMAIL="${PRODUCTION_TEST_EMAIL}" \
          STAGING_TEST_SECRET="${PRODUCTION_TEST_SECRET}" \
          python scripts/staging_smoke.py --base-url "${PRODUCTION_API_URL}"

      - name: Record release provenance summary
        if: always()
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ROLLBACK_IMAGE_TAG: ${{ inputs.rollback_image_tag }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          {
            echo "## LionsForge AI production backend provenance"
            echo
            echo "- Release SHA tag: \`${IMAGE_TAG}\`"
            echo "- Rollback SHA tag: \`${ROLLBACK_IMAGE_TAG}\`"
            echo "- Registry digest: \`${IMAGE_DIGEST:-unavailable}\`"
            echo "- Running backend containers verified: \`${DEPLOYED_IMAGE_IDS:-0}\`"
            echo "- API: ${PRODUCTION_API_URL}"
            echo "- TLS secret: lionsforge-api-tls verified during successful deployment"
            echo
            echo "Record the digest in the production acceptance record. No credentials or registry tokens are included."
          } >> "$GITHUB_STEP_SUMMARY"
