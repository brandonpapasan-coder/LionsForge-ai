name: Staging Preflight

on:
  workflow_dispatch:
    inputs:
      skip_endpoints:
        description: Validate configuration only and skip public endpoint checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify Terraform state access
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          test -n "${TF_STATE_BUCKET}"
          aws s3api head-bucket --bucket "${TF_STATE_BUCKET}"
          aws s3api get-bucket-versioning --bucket "${TF_STATE_BUCKET}"
          aws s3api get-public-access-block --bucket "${TF_STATE_BUCKET}"
          aws s3api get-bucket-encryption --bucket "${TF_STATE_BUCKET}"

      - name: Run staging preflight
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          AWS_TERRAFORM_PLAN_ROLE_ARN: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          AWS_TERRAFORM_APPLY_ROLE_ARN: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          if [[ "${{ inputs.skip_endpoints }}" == "true" ]]; then
            python scripts/staging_preflight.py --skip-endpoints
          else
            python scripts/staging_preflight.py
          fi
