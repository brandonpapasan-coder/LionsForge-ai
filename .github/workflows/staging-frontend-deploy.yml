name: Staging Frontend Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable frontend image tag (40-character commit SHA)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          test -n "${IMAGE_TAG}"
          if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "image_tag must be an immutable 40-character lowercase commit SHA" >&2
            exit 1
          fi
          case "${STAGING_WEB_URL}" in
            https://*) ;;
            *) echo "STAGING_WEB_URL must be a non-empty HTTPS URL" >&2; exit 1 ;;
          esac

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/frontend:${IMAGE_TAG}"
          docker build -t "${IMAGE}" frontend
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Configure kubectl
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          test -n "${KUBE_CONFIG_STAGING}"
          mkdir -p "$HOME/.kube"
          printf '%s' "${KUBE_CONFIG_STAGING}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Deploy frontend
        run: |
          kubectl apply -k infra/k8s/overlays/staging
          kubectl -n lionsforge-staging set image deployment/lionsforge-frontend frontend="${IMAGE}"
          kubectl -n lionsforge-staging rollout status deployment/lionsforge-frontend --timeout=300s

      - name: Smoke test frontend
        env:
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          curl --fail --silent --show-error --location "${STAGING_WEB_URL}/login" > login.html
          grep -q "LionsForge" login.html
