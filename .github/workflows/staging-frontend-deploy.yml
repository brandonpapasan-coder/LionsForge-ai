name: Staging Frontend Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable frontend image tag (40-character commit SHA)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          test -n "${IMAGE_TAG}"
          if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "image_tag must be an immutable 40-character lowercase commit SHA" >&2
            exit 1
          fi
          case "${STAGING_WEB_URL}" in
            https://*) ;;
            *) echo "STAGING_WEB_URL must be a non-empty HTTPS URL" >&2; exit 1 ;;
          esac

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/frontend:${IMAGE_TAG}"
          docker build -t "${IMAGE}" frontend
          docker push "${IMAGE}"
          docker pull "${IMAGE}"
          IMAGE_REF="$(docker image inspect "${IMAGE}" --format '{{index .RepoDigests 0}}')"
          IMAGE_DIGEST="${IMAGE_REF##*@}"
          if ! printf '%s' "${IMAGE_DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "Could not resolve an immutable sha256 image digest" >&2
            exit 1
          fi
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

      - name: Configure kubectl
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          test -n "${KUBE_CONFIG_STAGING}"
          mkdir -p "$HOME/.kube"
          printf '%s' "${KUBE_CONFIG_STAGING}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Deploy frontend
        run: |
          kubectl apply -k infra/k8s/overlays/staging
          kubectl -n lionsforge-staging set image deployment/lionsforge-frontend frontend="${IMAGE_REF}"
          kubectl -n lionsforge-staging rollout status deployment/lionsforge-frontend --timeout=300s

      - name: Verify deployed image provenance
        run: |
          set -euo pipefail
          mapfile -t IMAGE_IDS < <(
            kubectl -n lionsforge-staging get pods \
              -l app=lionsforge-frontend \
              -o jsonpath='{range .items[*].status.containerStatuses[?(@.name=="frontend")]}{.imageID}{"\n"}{end}'
          )
          test "${#IMAGE_IDS[@]}" -gt 0
          for image_id in "${IMAGE_IDS[@]}"; do
            normalized="${image_id#docker-pullable://}"
            if [[ "${normalized}" != *@"${IMAGE_DIGEST}" ]]; then
              echo "Running frontend pod image ID does not match pushed digest" >&2
              exit 1
            fi
          done
          echo "DEPLOYED_IMAGE_IDS=${#IMAGE_IDS[@]}" >> "$GITHUB_ENV"

      - name: Smoke test frontend
        env:
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          curl --fail --silent --show-error --location "${STAGING_WEB_URL}/login" > login.html
          grep -q "LionsForge" login.html

      - name: Publish image provenance summary
        if: always()
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "## Staging frontend image provenance"
            echo
            echo "- Release SHA tag: \`${IMAGE_TAG}\`"
            echo "- Registry digest: \`${IMAGE_DIGEST:-unavailable}\`"
            echo "- Running frontend containers verified: \`${DEPLOYED_IMAGE_IDS:-0}\`"
            echo
            echo "Record the digest in the staging acceptance record. No credentials or registry tokens are included."
          } >> "${GITHUB_STEP_SUMMARY}"
