name: Security Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "security/**"
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security analyzers
        run: python -m pip install --disable-pip-version-check bandit==1.7.10 semgrep

      - name: Run Bandit
        run: bandit -q -r backend/app -x backend/tests -f json -o bandit-report.json

      - name: Run Semgrep
        run: semgrep scan --config=p/default --json --output semgrep-report.json backend frontend

      - name: Enforce Semgrep error findings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("semgrep-report.json").read_text())
          findings = [
              item for item in report.get("results", [])
              if item.get("extra", {}).get("severity") == "ERROR"
          ]
          if findings:
              for item in findings:
                  print(f"{item.get('path')}:{item.get('start', {}).get('line')} {item.get('check_id')}")
              raise SystemExit(f"Semgrep found {len(findings)} error-severity finding(s)")
          PY

      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            bandit-report.json
            semgrep-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.7.3
          pip-audit -r requirements.txt --progress-spinner=off --format=json --output=../python-audit.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm audit --audit-level=high --json > ../npm-audit.json

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            python-audit.json
            npm-audit.json
          retention-days: 30

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run pinned Gitleaks CLI
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="zricethezav/gitleaks:v8.24.2"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            test -n "$PR_BASE_SHA"
            test -n "$PR_HEAD_SHA"
            range="$PR_BASE_SHA..$PR_HEAD_SHA"
            docker run --rm -v "$PWD:/repo" -w /repo "$image" git --redact --log-opts="$range"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            range="$PUSH_BEFORE_SHA..$CURRENT_SHA"
            docker run --rm -v "$PWD:/repo" -w /repo "$image" git --redact --log-opts="$range"
          else
            docker run --rm -v "$PWD:/repo" -w /repo "$image" git --redact
          fi

  container-security:
    name: Container security and SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lionsforge-backend:security backend

      - name: Build frontend image
        run: docker build -t lionsforge-frontend:security frontend

      - name: Scan backend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:0.58.2 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /work/backend-trivy.json \
            lionsforge-backend:security

      - name: Scan frontend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:0.58.2 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /work/frontend-trivy.json \
            lionsforge-frontend:security

      - name: Generate backend SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:0.58.2 image \
            --format spdx-json \
            --output /work/backend-sbom.spdx.json \
            lionsforge-backend:security

      - name: Generate frontend SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:0.58.2 image \
            --format spdx-json \
            --output /work/frontend-sbom.spdx.json \
            lionsforge-frontend:security

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-artifacts
          path: |
            backend-trivy.json
            frontend-trivy.json
            backend-sbom.spdx.json
            frontend-sbom.spdx.json
          retention-days: 30
