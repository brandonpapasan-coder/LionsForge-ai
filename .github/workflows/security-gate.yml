name: Security Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "security/**"
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security analyzers
        run: python -m pip install --disable-pip-version-check bandit==1.7.10 semgrep

      - name: Run Bandit
        run: bandit -q -r backend/app -x backend/tests -f json -o bandit-report.json

      - name: Run Semgrep
        run: semgrep scan --config=auto --error --json --output semgrep-report.json backend frontend

      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            bandit-report.json
            semgrep-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.7.3
          pip-audit -r requirements.txt --progress-spinner=off --format=json --output=../python-audit.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm audit --audit-level=high --json > ../npm-audit.json

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            python-audit.json
            npm-audit.json
          retention-days: 30

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  container-security:
    name: Container security and SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lionsforge-backend:security backend

      - name: Build frontend image
        run: docker build -t lionsforge-frontend:security frontend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: lionsforge-backend:security
          format: sarif
          output: backend-trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: lionsforge-frontend:security
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: lionsforge-backend:security
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: lionsforge-frontend:security
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-artifacts
          path: |
            backend-trivy.sarif
            frontend-trivy.sarif
            backend-sbom.spdx.json
            frontend-sbom.spdx.json
          retention-days: 30
